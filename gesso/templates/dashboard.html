{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block body %}
<div class="min-h-screen bg-black text-white flex flex-col">
  <header class="border-b border-neutral-800 px-6 py-4 flex items-center justify-between">
    <div class="text-sm text-neutral-400">
      Logged in as <span class="font-medium text-white">{{ user.username }}</span>
    </div>
    <div class="space-x-3 text-xs">
      <a href="{{ url_for('index') }}" class="text-neutral-400 hover:text-white">Home</a>
      <a href="{{ url_for('auth.logout') }}" class="text-neutral-400 hover:text-red-400">Logout</a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center">
    <div class="border border-neutral-800 rounded-xl px-10 py-8 bg-neutral-950/80">
      <h1 class="text-2xl font-semibold mb-2">Artist dashboard (WIP)</h1>
      <p class="text-sm text-neutral-400 max-w-md">
        This is a temporary placeholder. later add stats about your artworks,
        competitions, badges, and portfolio performance.
      </p>
    </div>
  </main>
</div>
{% endblock %}
