{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-black text-white">
  <div class="w-full max-w-md border border-neutral-800 rounded-xl p-8 bg-neutral-950/80">
    <h1 class="text-2xl font-semibold mb-6">Login</h1>
    <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">
      <div>
        <label class="block text-sm mb-1">Email or Username</label>
        <input name="identifier" type="text"
               class="w-full px-3 py-2 rounded-md bg-neutral-900 border border-neutral-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <div>
        <label class="block text-sm mb-1">Password</label>
        <input name="password" type="password"
               class="w-full px-3 py-2 rounded-md bg-neutral-900 border border-neutral-700 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <button type="submit"
              class="w-full py-2 rounded-md bg-indigo-500 hover:bg-indigo-400 text-sm font-medium">
        Login
      </button>
    </form>

    <div class="mt-4 text-center text-xs text-neutral-400">
      New here?
      <a href="{{ url_for('auth.signup') }}" class="text-indigo-400 hover:underline">Create an account</a>
    </div>

    <div class="mt-6">
      <button onclick="window.location.href='{{ url_for('auth.login_google') }}'"
              class="w-full py-2 rounded-md border border-neutral-700 text-sm hover:bg-neutral-900">
        Continue with Google
      </button>
    </div>
  </div>
</div>
{% endblock %}
